# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:20}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================
# JWT CONFIGURATION
# ============================================
# IMPORTANT: Set JWT_SECRET as an environment variable in production!
# Generate a secure key: openssl rand -base64 64
jwt.secret=${JWT_SECRET:YourDefaultDevSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# SWAGGER / OPENAPI
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# LOGGING
# ============================================
logging.level.com.company.inventory=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

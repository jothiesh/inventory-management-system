# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080
spring.application.name=inventory-management

# ============================================
# DATABASE CONFIGURATION (MySQL for Production)
# ============================================
spring.datasource.url=jdbc:mysql://thinturedb.c3oqsa2ui3r2.ap-south-1.rds.amazonaws.com:3306/stock?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&cachePrepStmts=true&useServerPrepStmts=true
spring.datasource.username=admin

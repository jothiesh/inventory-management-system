# ============================================
# PROD PROFILE - AWS RDS Production
# ============================================
# Activate: spring.profiles.active=prod (or set SPRING_PROFILES_ACTIVE=prod)
#
# SET THESE ENVIRONMENT VARIABLES ON YOUR SERVER:
#   DB_HOST=your-rds-endpoint.amazonaws.com
#   DB_PORT=3306
#   DB_NAME=stock
#   DB_USERNAME=admin
#   DB_PASSWORD=YourSecurePassword
#   JWT_SECRET=YourSuperLongSecureRandomKey
#
# Example (Linux):
#   export DB_HOST=thinturedb.c3oqsa2ui3r2.ap-south-1.rds.amazonaws.com
#   export DB_USERNAME=admin
#   export DB_PASSWORD=YourPassword
#   export JWT_SECRET=$(openssl rand -base64 64)
# ============================================

# Validate schema (don't auto-create in production)
spring.jpa.hibernate.ddl-auto=validate

# No SQL logging in production
spring.jpa.show-sql=false

# Production logging
logging.level.com.company.inventory=INFO
logging.level.root=WARN

# Connection pool tuning for production
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10

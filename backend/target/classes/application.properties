# Connection Pool (HikariCP)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
# CHANGED: Turned this to true to force SQL strings to print
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:YourDefaultDevSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# SWAGGER / OPENAPI
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# LOGGING (UPDATED FOR DETAILED VIEW)
# ============================================
# Forces the console output to use colors so logs are easier to read
spring.output.ansi.enabled=ALWAYS

# Global fallback log level
logging.level.root=INFO

# CHANGED: See your custom logs in full detail
logging.level.com.company.inventory=DEBUG

# CHANGED: See incoming API requests, HTTP methods, and URL mappings
logging.level.org.springframework.web=DEBUG

# CHANGED: See security filter chains, JWT validation, and login checks
logging.level.org.springframework.security=DEBUG

# CHANGED: Prints the exact SQL statements generated by Hibernate
logging.level.org.hibernate.SQL=DEBUG

# ADDED: Prints the actual values (parameters) passed into those SQL queries
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ============================================
# QC MODULE
